# Server
server.port=8080

# H2 In-Memory Database (no installation required)
spring.datasource.url=jdbc:h2:mem:mediseconddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Secret (change in production!)
app.jwt.secret=medisecond-super-secret-key-that-is-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,medisecond-production.up.railway.app
